data:
  root: "/root/autodl-tmp/keypoint_promptable_reidentification-main_old"
  sources: ['night600_en']
  targets: ['night600_en']
  height: 256
  width: 128
  norm_mean: [0.485, 0.456, 0.406]
  norm_std: [0.229, 0.224, 0.225]
  transforms: ["rc", "re"]
  save_dir: 'logs/night600_en_cam3'

model:
  pretrained: false
  backbone_pretrained_path: ""
  save_model_flag: True # 保存模型
  kpr:
    backbone: "solider_swin_base_patch4_window7_224"
    keypoints:
      prompt_masks: keypoints_gaussian
      prompt_preprocess: cck6
    masks:
      dir: "pifpaf_maskrcnn_filtering"
      preprocess: "five_v"
  transreid:
    cam_num: 3

train:
  lr: 0.0002
  reduced_lr: 0.0002
  fixbase_epoch: 20
  max_epoch: 30
